version: '3.8'

services:
  # ============================================
  # Reverse Proxy (Nginx)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: repodiscover-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - repodiscover-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Main Application (FastAPI)
  # ============================================
  web:
    image: ghcr.io/${REPO_OWNER:-wei}/repodiscoverai:latest
    container_name: repodiscover-web
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-repodiscover}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-repodiscover}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - repodiscover-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: repodiscover-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-repodiscover}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-repodiscover}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - repodiscover-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-repodiscover}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: repodiscover-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - repodiscover-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Prometheus (Metrics)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: repodiscover-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - repodiscover-network
    depends_on:
      - web

  # ============================================
  # Grafana (Dashboard)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: repodiscover-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - repodiscover-network
    depends_on:
      - prometheus

  # ============================================
  # Loki (Logs)
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: repodiscover-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - repodiscover-network

  # ============================================
  # Promtail (Log Shipper)
  # ============================================
  promtail:
    image: grafana/promtail:latest
    container_name: repodiscover-promtail
    restart: unless-stopped
    volumes:
      - ./logs:/var/log/app:ro
      - /var/log:/var/log:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - repodiscover-network
    depends_on:
      - loki

  # ============================================
  # Alertmanager
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: repodiscover-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - repodiscover-network
    depends_on:
      - prometheus

  # ============================================
  # Backup Service
  # ============================================
  backup:
    image: postgres:15-alpine
    container_name: repodiscover-backup
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-repodiscover}
      - DB_USER=${DB_USER:-repodiscover}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - repodiscover-network
    depends_on:
      - postgres
    # Run backup daily at 2 AM
    command: >
      sh -c "
        while true; do
          /backup.sh;
          sleep 86400;
        done
      "

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  repodiscover-network:
    driver: bridge
