# Alertmanager Configuration
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@repodiscoverai.com'
  smtp_require_tls: true
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    
    - match:
        severity: warning
      receiver: 'warning-receiver'

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@repodiscoverai.com'
        send_resolved: true
        html: |
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; }
              .alert { padding: 15px; margin: 10px 0; border-radius: 5px; }
              .critical { background-color: #ffebee; border-left: 4px solid #f44336; }
              .warning { background-color: #fff3e0; border-left: 4px solid #ff9800; }
            </style>
          </head>
          <body>
            <h2>🚨 Alert: {{ .GroupLabels.alertname }}</h2>
            <div class="alert {{ .GroupLabels.severity }}">
              <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
              <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
              <p><strong>Description:</strong> {{ .Annotations.description }}</p>
              <p><strong>Started:</strong> {{ .StartsAt }}</p>
            </div>
          </body>
          </html>

  - name: 'critical-receiver'
    email_configs:
      - to: 'oncall@repodiscoverai.com'
        send_resolved: true
        html: true
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ .Annotations.description }}'
        color: 'danger'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'dev-team@repodiscoverai.com'
        send_resolved: true
        html: true
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ .Annotations.description }}'
        color: 'warning'

# Silence settings
mute_time_intervals:
  - name: 'maintenance-window'
    time_intervals:
      - times:
          - start_time: '02:00'
            end_time: '04:00'
        weekdays: ['sunday']
